            <div class="contactForm">
                <form id="contactFormElement" action="#" method="POST">
                    <div class="contactInput">
                        <label for="firstName">First name:</label>
                        <input type="text" id="firstName" name="firstName" required>
                    </div>
                    <div class="contactInput">
                        <label for="lastName">Last name:</label>
                        <input type="text" id="lastName" name="lastName" required>
                    </div>
                    <div class="contactInput">
                        <label for="email">Email:</label>
                        <input type="text" id="email" name="email" required>
                    </div>
                    <div class="contactInput">
                        <label for="phoneNumber">Phone number:</label>
                        <input type="text" id="phoneNumber" name="phoneNumber" required>
                    </div>
                    <div class="radioButtons">
                        <span>Select subject?</span>
                        <div class="radioButtonItems">
                            <div class="radioGroup">
                                <input type="radio" id="generalInquiry_01" value="generalInquiry_01" name="subject">
                                <span class="customRadio"></span>
                                <label for="generalInquiry_01">General Inquiry 1</label>
                            </div>
                            <div class="radioGroup">
                                <input type="radio" id="generalInquiry_02" value="generalInquiry_02" name="subject">
                                <span class="customRadio"></span>
                                <label for="generalInquiry_02">General Inquiry 2</label>
                            </div>
                            <div class="radioGroup">
                                <input type="radio" id="generalInquiry_03" value="generalInquiry_03" name="subject">
                                <span class="customRadio"></span>
                                <label for="generalInquiry_03">General Inquiry 3</label>
                            </div>
                            <div class="radioGroup">
                                <input type="radio" id="generalInquiry_04" value="generalInquiry_04" name="subject">
                                <label for="generalInquiry_04">General Inquiry 4</label>
                            </div>
                        </div>
                    </div>
                    <div  class="contactInput message">
                        <label for="message">Message:</label>
                        <input type="text" id="message" name="message" required>
                    </div>
                    <div>
                        <p id="error-message"></p>
                    </div>
                    <div class="submitButton">
                        <input type="submit" value="Submit">
                    </div>

                </form>
